
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tran Thien Quy - Event Producer</title>
    <!-- Keeping Tailwind CDN for simplicity in migration to ensure styles remain exactly the same -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter, Playwrite CZ, and Be Vietnam Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200&family=Playwrite+CZ:wght@100..400&display=swap" rel="stylesheet">
    
    <!-- Open Graph / Facebook / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:title" content="Tran Thien Quy - Event Producer">
    <meta property="og:description" content="Portfolio of Tran Thien Quy - Event Producer & Art Director">
    <meta property="og:image" content="">

    <style>
      /* Khai báo Font SVN-Gratelos Display */
      @font-face {
        font-family: 'SVN-Gratelos Display';
        /* Lưu ý: Bạn nên thay link này bằng link CDN thực tế của bạn hoặc file trong project */
        src: url('https://cdn.jsdelivr.net/gh/font-source/svn-gratelos-display@master/SVN-Gratelos%20Display.woff2') format('woff2'),
             local('SVN-Gratelos Display');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* Custom Font Classes */
      .font-gratelos {
        font-family: 'SVN-Gratelos Display', sans-serif;
      }
      .font-heading {
        font-family: 'Playwrite CZ', cursive;
      }
      .font-body {
        font-family: 'Be Vietnam Pro', sans-serif;
      }
      .font-inter {
        font-family: 'Inter', sans-serif;
      }
      
      /* Smooth Scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Hide scrollbar for clean aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0f1c; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155; 
      }

    </style>
</head>
  <body class="bg-[#050505] text-white antialiased overflow-x-hidden selection:bg-blue-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
